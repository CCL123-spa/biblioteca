<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f8f8;
    --surface: #ffffff;
    --border: #e8e8e8;
    --border-strong: #d0d0d0;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --text-muted: #999999;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --green: #16a34a;
    --amber: #d97706;
    --star: #f59e0b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .search-wrap {
    flex: 1;
    max-width: 480px;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 9px 40px 9px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    transition: all 0.15s;
    outline: none;
  }

  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }

  .search-icon {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; font-size: 1rem;
  }

  .header-stats {
    display: flex; gap: 24px; margin-left: auto; flex-shrink: 0;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    display: block;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
    display: block;
  }

  /* Main layout */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: white;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .sort-select {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    margin-left: auto;
  }

  .add-btn {
    padding: 7px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .add-btn:hover { background: var(--accent-hover); }

  /* Book count */
  .results-info {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  /* Books grid */
  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 16px;
  }

  .book-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
  }

  .book-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .book-spine {
    height: 3px;
    background: var(--border);
  }

  .book-spine.leido { background: var(--green); }
  .book-spine.leyendo { background: var(--amber); }
  .book-spine.noleido { background: #dc2626; }
  .book-spine.dudoso { background: #7c3aed; }

  .book-body {
    padding: 12px;
  }

  .book-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-author {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .stars {
    display: flex;
    gap: 1px;
  }

  .star {
    font-size: 0.8rem;
    color: var(--border-strong);
    cursor: pointer;
    transition: color 0.1s;
    line-height: 1;
  }

  .star.filled { color: var(--star); }
  .star:hover { color: var(--star); }

  .read-badge {
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .read-badge.leido { background: #dcfce7; color: #15803d; }
  .read-badge.leyendo { background: #fef3c7; color: #b45309; }
  .read-badge.pendiente { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
  .read-badge.noleido { background: #fee2e2; color: #dc2626; }
  .read-badge.dudoso { background: #f3e8ff; color: #7c3aed; }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state .big-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
  .empty-state p { font-size: 0.9rem; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 36px;
    text-align: center;
    margin-bottom: 28px;
    transition: all 0.2s;
    cursor: pointer;
    background: white;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(37,99,235,0.02);
  }

  .upload-zone h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .upload-zone p {
    font-size: 0.88rem;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .upload-btn-inner {
    display: inline-block;
    padding: 8px 20px;
    background: var(--accent);
    color: white;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .upload-btn-inner:hover { background: var(--accent-hover); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 12px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .modal-subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 3px;
  }

  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 1.3rem; padding: 4px;
    flex-shrink: 0; line-height: 1; border-radius: 4px;
  }
  .modal-close:hover { background: var(--bg); color: var(--text); }

  .modal-body { padding: 20px 24px 24px; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .stars-input {
    display: flex; gap: 6px; margin-top: 4px;
  }

  .star-input {
    font-size: 1.6rem;
    cursor: pointer;
    color: var(--border-strong);
    transition: color 0.1s;
    line-height: 1;
  }

  .star-input.filled { color: var(--star); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    padding-top: 8px;
  }

  .btn-cancel {
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg); }

  .btn-save {
    padding: 9px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-save:hover { background: var(--accent-hover); }

  /* AI Processing */
  .ai-processing {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    text-align: center;
    gap: 16px;
  }

  .ai-processing.visible { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-msg {
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: var(--text-muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* Book detail modal extras */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .detail-field label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .detail-field span {
    font-size: 0.9rem;
    color: var(--text);
  }

  .delete-btn {
    background: none;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    margin-right: auto;
    transition: all 0.15s;
  }

  .delete-btn:hover { background: #fee2e2; }

  /* Search highlight */
  .highlight { background: #fef9c3; border-radius: 2px; }

  .genre-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .genre-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: white;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .genre-btn:hover { border-color: var(--accent); color: var(--accent); }
  .genre-btn.active { background: #eff6ff; color: var(--accent); border-color: var(--accent); font-weight: 500; }

  /* Responsive */
  @media (max-width: 640px) {
    .header-stats { display: none; }
    .books-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">Mi<span> Biblioteca</span></div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar título, autor…" oninput="filterBooks()">
      <span class="search-icon">⌕</span>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">Libros</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statRead">0</span>
        <span class="stat-label">Leídos</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statAvg">—</span>
        <span class="stat-label">Media ★</span>
      </div>
    </div>
  </div>
</header>

<main class="main">

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('leido', this)">Leídos</button>
    <button class="filter-btn" onclick="setFilter('leyendo', this)">Leyendo</button>
    <button class="filter-btn" onclick="setFilter('pendiente', this)">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('noleido', this)">No leídos</button>
    <button class="filter-btn" onclick="setFilter('dudoso', this)">Sin confirmar</button>
    <select class="sort-select" onchange="sortBooks(this.value)">
      <option value="added">Orden de añadido</option>
      <option value="title">Título A–Z</option>
      <option value="author">Autor A–Z</option>
      <option value="rating">Mejor valoración</option>
    </select>
    <button class="add-btn" onclick="openAddModal()">+ Añadir manualmente</button>
  </div>

  <div class="genre-filters" id="genreFilters"></div>

  <div class="results-info" id="resultsInfo"></div>

  <div class="books-grid" id="booksGrid"></div>

</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Añadir libro</div>
        <div class="modal-subtitle" id="modalSubtitle">Introduce los datos del libro</div>
      </div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="formContent">
        <input type="hidden" id="editingId">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Título *</label>
            <input type="text" class="form-input" id="fTitle" placeholder="El nombre del viento…">
          </div>
          <div class="form-group">
            <label class="form-label">Autor *</label>
            <input type="text" class="form-input" id="fAuthor" placeholder="Patrick Rothfuss">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Categoría</label>
            <select class="form-select" id="fGenreSelect" onchange="onGenreSelectChange()">
              <option value="">— Selecciona categoría —</option>
            </select>
            <input type="text" class="form-input" id="fGenre" placeholder="Nombre de la nueva categoría…" style="display:none; margin-top:8px;">
          </div>
          <div class="form-group">
            <label class="form-label">Año</label>
            <input type="number" class="form-input" id="fYear" placeholder="2007">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-select" id="fStatus">
            <option value="pendiente">📚 Pendiente</option>
            <option value="leyendo">📖 Leyendo ahora</option>
            <option value="leido">✓ Leído</option>
            <option value="noleido">✗ No leído</option>
            <option value="dudoso">🤔 No estoy seguro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Valoración</label>
          <div class="stars-input" id="starsInput">
            <span class="star-input" data-v="1" onclick="setRating(1)">★</span>
            <span class="star-input" data-v="2" onclick="setRating(2)">★</span>
            <span class="star-input" data-v="3" onclick="setRating(3)">★</span>
            <span class="star-input" data-v="4" onclick="setRating(4)">★</span>
            <span class="star-input" data-v="5" onclick="setRating(5)">★</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas personales</label>
          <textarea class="form-textarea" id="fNotes" placeholder="Tus impresiones, citas favoritas…"></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal('addModal')">Cancelar</button>
          <button class="btn-save" onclick="saveBook()">Guardar libro</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Book Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="detailTitle">—</div>
        <div class="modal-subtitle" id="detailAuthor">—</div>
      </div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="detailGrid"></div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="detailStatus" onchange="updateDetailStatus()"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Valoración</label>
        <div class="stars-input" id="detailStars"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Notas</label>
        <textarea class="form-textarea" id="detailNotes" onchange="updateDetailNotes()" placeholder="Sin notas…"></textarea>
      </div>
      <div class="modal-footer">
        <button class="delete-btn" onclick="deleteCurrentBook()">🗑 Eliminar</button>
        <button class="btn-cancel" onclick="closeModal('detailModal')">Cerrar</button>
        <button class="btn-save" onclick="editCurrentBook()">✏ Editar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Config Google Sheets ────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbwl351Kt-AfNiYgysnKHLQ5Q2wBuqlMUZS75KSbrpqBOq3lEZOrPCkz5I8PnBJ3sxG_/exec';

// ─── Data ───────────────────────────────────────────────────────────────────
let books = [];
let currentFilter = 'all';
let currentGenre = 'all';
let currentSort = 'added';
let currentDetailId = null;
let pendingRating = 0;
let isSaving = false;

// Mapeo de géneros a categorías agrupadas
const CATEGORY_MAP = {
  'Ciencia Ficción': 'Ciencia Ficción',
  'Arquitectura': 'Arquitectura',
  'Arte': 'Arte',
  'Ficción': 'Ficción',
  'Filosofía': 'Filosofía',
  'Náutica': 'Náutica',
  'Fotografía': 'Fotografía',
  'Finanzas': 'Finanzas',
  'Historia': 'Historia',
  'Cómic': 'Cómic',
  'Poesía': 'Poesía',
  'No ficción': 'No ficción',
  'Autoayuda': 'Autoayuda',
  'Thriller': 'Thriller',
  'Relojería': 'Relojería',
  'Ingeniería': 'Ingeniería',
  'Jardinería': 'Jardinería',
  'Psicología': 'Psicología',
  'Economía': 'Economía',
  'Memorias': 'Memorias',
  'Clásico': 'Clásicos',
  'Viajes': 'Viajes',
};

function getCategory(genre) {
  if (!genre) return null;
  const parts = genre.split('/').map(s => s.trim());
  for (const part of parts) {
    for (const key of Object.keys(CATEGORY_MAP)) {
      if (part.toLowerCase().includes(key.toLowerCase())) return CATEGORY_MAP[key];
    }
  }
  return parts[0];
}

function renderGenreFilters() {
  const counts = {};
  books.forEach(b => {
    const cat = getCategory(b.genre);
    if (cat) counts[cat] = (counts[cat] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const container = document.getElementById('genreFilters');
  container.innerHTML = `<button class="genre-btn active" onclick="setGenre('all', this)">Todas las categorías</button>` +
    sorted.map(([cat, n]) =>
      `<button class="genre-btn" onclick="setGenre('${cat.replace(/'/g,"\\'")}', this)">${cat} <span style="opacity:0.5;font-size:0.75em">${n}</span></button>`
    ).join('');
}

function setGenre(g, btn) {
  currentGenre = g;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

}

// ─── Google Sheets API ───────────────────────────────────────────────────────
async function gsPost(payload) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch(e) { console.error('Error Sheets:', e); }
}

async function gsLoad() {
  showLoading(true);
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const rows = await res.json();
    if (!Array.isArray(rows) || rows.length === 0) {
      // Primera vez: volcar los 432 libros
      await gsInit();
    } else {
      books = rows.map(r => ({
        id: Number(r.id),
        title: r.titulo || '',
        author: r.autor || '',
        genre: r.genero || '',
        year: String(r['año'] || ''),
        status: r.estado || 'pendiente',
        rating: Number(r.valoracion) || 0,
        notes: r.notas || ''
      }));
    }
  } catch(e) {
    console.error('Error cargando:', e);
    alert('Error al cargar la biblioteca. Comprueba la conexión.');
  }
  showLoading(false);
  renderGenreFilters();
  renderBooks();
  renderStats();
}

async function gsInit() {
  showLoading(true, 'Cargando tu biblioteca en Google Sheets (primera vez)…');
  const booksToSend = preloadedBooks.map((b, i) => ({
    titulo: b.title, autor: b.author, genero: b.genre,
    'año': b.year, estado: b.status, valoracion: b.rating, notas: b.notes
  }));
  await gsPost({ action: 'init', books: booksToSend });
  await gsLoad();
}

async function saveBook_gs(book, isNew) {
  if (isNew) {
    await gsPost({ action: 'add', book: {
      titulo: book.title, autor: book.author, genero: book.genre,
      'año': book.year, estado: book.status, valoracion: book.rating, notas: book.notes
    }});
    await gsLoad();
  } else {
    await gsPost({ action: 'update', id: book.id, data: {
      titulo: book.title, autor: book.author, genero: book.genre,
      'año': book.year, estado: book.status, valoracion: book.rating, notas: book.notes
    }});
  }
}

async function deleteBook_gs(id) {
  await gsPost({ action: 'delete', id });
  await gsLoad();
}

function showLoading(on, msg) {
  let el = document.getElementById('loadingBar');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingBar';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#2563eb;color:white;text-align:center;padding:10px;font-size:0.85rem;font-family:inherit;';
    document.body.prepend(el);
  }
  if (on) {
    el.textContent = msg || 'Sincronizando con Google Sheets…';
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

  renderStats();
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderBooks() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = books.filter(b => {
    if (currentFilter === 'leido' && b.status !== 'leido') return false;
    if (currentFilter === 'leyendo' && b.status !== 'leyendo') return false;
    if (currentFilter === 'pendiente' && b.status !== 'pendiente') return false;
    if (currentGenre !== 'all' && getCategory(b.genre) !== currentGenre) return false;
    if (query) {
      const inTitle = b.title.toLowerCase().includes(query);
      const inAuthor = b.author.toLowerCase().includes(query);
      return inTitle || inAuthor;
    }
    return true;
  });

  // Sort
  if (currentSort === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
  else if (currentSort === 'author') filtered.sort((a,b) => a.author.localeCompare(b.author));
  else if (currentSort === 'rating') filtered.sort((a,b) => (b.rating||0) - (a.rating||0));
  else filtered.sort((a,b) => b.id - a.id);

  const grid = document.getElementById('booksGrid');
  const info = document.getElementById('resultsInfo');

  if (query) {
    info.textContent = `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''} para "${query}"`;
  } else if (currentFilter !== 'all') {
    info.textContent = `${filtered.length} libro${filtered.length !== 1 ? 's' : ''} ${currentFilter === 'leido' ? 'leídos' : currentFilter === 'leyendo' ? 'en curso' : 'pendientes'}`;
  } else {
    info.textContent = `${filtered.length} libro${filtered.length !== 1 ? 's' : ''} en tu biblioteca`;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="big-icon">📚</div>
      <h3>${books.length === 0 ? 'Tu biblioteca está vacía' : 'Sin resultados'}</h3>
      <p>${books.length === 0 ? 'Sube una fotografía de tu estantería para empezar' : 'Prueba con otro término de búsqueda'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(b => {
    const statusClass = b.status || 'pendiente';
    const statusLabel = statusClass === 'leido' ? 'Leído' : statusClass === 'leyendo' ? 'Leyendo' : statusClass === 'noleido' ? 'No leído' : statusClass === 'dudoso' ? 'No estoy seguro' : 'Pendiente';
    const stars = [1,2,3,4,5].map(i =>
      `<span class="star ${i <= (b.rating||0) ? 'filled' : ''}">★</span>`
    ).join('');

    let titleHtml = escHtml(b.title);
    let authorHtml = escHtml(b.author);
    if (query) {
      titleHtml = highlight(titleHtml, query);
      authorHtml = highlight(authorHtml, query);
    }

    return `<div class="book-card" onclick="openDetail(${b.id})">
      <div class="book-spine ${statusClass}"></div>
      <div class="book-body">
        <div class="book-title">${titleHtml}</div>
        <div class="book-author">${authorHtml}</div>
        <div class="book-footer">
          <div class="stars">${stars}</div>
          <span class="read-badge ${statusClass}">${statusLabel}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  document.getElementById('statTotal').textContent = books.length;
  document.getElementById('statRead').textContent = books.filter(b => b.status === 'leido').length;
  const rated = books.filter(b => b.rating > 0);
  if (rated.length > 0) {
    const avg = rated.reduce((s,b) => s + b.rating, 0) / rated.length;
    document.getElementById('statAvg').textContent = avg.toFixed(1);
  } else {
    document.getElementById('statAvg').textContent = '—';
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(str, q) {
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return str.replace(regex, '<span class="highlight">$1</span>');
}

// ─── Add/Edit ─────────────────────────────────────────────────────────────────
function populateGenreSelect(selectedGenre) {
  // Recoger todas las categorías únicas de los libros
  const cats = new Set();
  books.forEach(b => {
    if (b.genre) cats.add(b.genre.split('/')[0].trim());
  });
  const sorted = [...cats].sort((a, b) => a.localeCompare(b));

  const sel = document.getElementById('fGenreSelect');
  sel.innerHTML = '<option value="">— Selecciona categoría —</option>' +
    sorted.map(c => `<option value="${c}"${c === selectedGenre ? ' selected' : ''}>${c}</option>`).join('') +
    '<option value="__nueva__">✚ Nueva categoría…</option>';

  const input = document.getElementById('fGenre');
  if (selectedGenre && !sorted.includes(selectedGenre)) {
    // Era una categoría nueva al editar
    sel.value = '__nueva__';
    input.value = selectedGenre;
    input.style.display = '';
  } else {
    input.style.display = 'none';
    input.value = '';
  }
}

function onGenreSelectChange() {
  const sel = document.getElementById('fGenreSelect');
  const input = document.getElementById('fGenre');
  if (sel.value === '__nueva__') {
    input.style.display = '';
    input.value = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = sel.value;
  }
}

function getGenreValue() {
  const sel = document.getElementById('fGenreSelect');
  const input = document.getElementById('fGenre');
  if (sel.value === '__nueva__') return input.value.trim();
  return sel.value;
}

function openAddModal() {
  pendingRating = 0;
  document.getElementById('editingId').value = '';
  document.getElementById('modalTitle').textContent = 'Añadir libro';
  document.getElementById('modalSubtitle').textContent = 'Introduce los datos del libro';
  document.getElementById('fTitle').value = '';
  document.getElementById('fAuthor').value = '';
  document.getElementById('fGenre').value = '';
  document.getElementById('fYear').value = '';
  document.getElementById('fStatus').value = 'pendiente';
  document.getElementById('fNotes').value = '';
  populateGenreSelect('');
  updateStarsUI(0, 'starsInput');
  openModal('addModal');
}

function saveBook() {
  const title = document.getElementById('fTitle').value.trim();
  const author = document.getElementById('fAuthor').value.trim();
  if (!title) { alert('El título es obligatorio'); return; }

  const editId = parseInt(document.getElementById('editingId').value);
  const bookData = {
    title,
    author: author || 'Autor desconocido',
    genre: getGenreValue(),
    year: document.getElementById('fYear').value.trim(),
    status: document.getElementById('fStatus').value,
    rating: pendingRating,
    notes: document.getElementById('fNotes').value.trim(),
  };

  if (editId) {
    const idx = books.findIndex(b => b.id === editId);
    if (idx !== -1) {
      books[idx] = { ...books[idx], ...bookData };
      saveBook_gs(books[idx], false);
    }
  } else {
    const newBook = { id: Date.now(), ...bookData };
    books.push(newBook);
    saveBook_gs(newBook, true);
  }

  save();
  renderGenreFilters();
  renderBooks();
  closeModal('addModal');
}

function setRating(v) {
  pendingRating = v;
  updateStarsUI(v, 'starsInput');
}

function updateStarsUI(rating, containerId) {
  document.querySelectorAll(`#${containerId} .star-input`).forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= rating);
  });
}

// ─── Detail ──────────────────────────────────────────────────────────────────
function openDetail(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  currentDetailId = id;

  document.getElementById('detailTitle').textContent = b.title;
  document.getElementById('detailAuthor').textContent = b.author;

  const grid = document.getElementById('detailGrid');
  grid.innerHTML = `
    ${b.genre ? `<div class="detail-field"><label>Género</label><span>${escHtml(b.genre)}</span></div>` : ''}
    ${b.year ? `<div class="detail-field"><label>Año</label><span>${escHtml(b.year)}</span></div>` : ''}
  `;

  const statusEl = document.getElementById('detailStatus');
  statusEl.innerHTML = `
    <option value="pendiente" ${b.status==='pendiente'?'selected':''}>📚 Pendiente</option>
    <option value="leyendo" ${b.status==='leyendo'?'selected':''}>📖 Leyendo ahora</option>
    <option value="leido" ${b.status==='leido'?'selected':''}>✓ Leído</option>
    <option value="noleido" ${b.status==='noleido'?'selected':''}>✗ No leído</option>
    <option value="dudoso" ${b.status==='dudoso'?'selected':''}>🤔 No estoy seguro</option>
  `;

  const starsEl = document.getElementById('detailStars');
  starsEl.innerHTML = [1,2,3,4,5].map(i =>
    `<span class="star-input ${i <= (b.rating||0) ? 'filled' : ''}" data-v="${i}" onclick="setDetailRating(${i})">★</span>`
  ).join('');

  document.getElementById('detailNotes').value = b.notes || '';
  openModal('detailModal');
}

function updateDetailStatus() {
  const b = books.find(x => x.id === currentDetailId);
  if (b) { b.status = document.getElementById('detailStatus').value; save(); renderBooks(); saveBook_gs(b, false); }
}

function updateDetailNotes() {
  const b = books.find(x => x.id === currentDetailId);
  if (b) { b.notes = document.getElementById('detailNotes').value; save(); saveBook_gs(b, false); }
}

function setDetailRating(v) {
  const b = books.find(x => x.id === currentDetailId);
  if (b) { b.rating = v; save(); renderBooks(); saveBook_gs(b, false); }
  document.querySelectorAll('#detailStars .star-input').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.v) <= v);
  });
}

function deleteCurrentBook() {
  const b = books.find(x => x.id === currentDetailId);
  if (!b) return;
  if (!confirm(`¿Eliminar "${b.title}"?`)) return;
  const delId = currentDetailId;
  books = books.filter(x => x.id !== delId);
  save(); renderGenreFilters(); renderBooks(); closeModal('detailModal');
  deleteBook_gs(delId);
}

function editCurrentBook() {
  const b = books.find(x => x.id === currentDetailId);
  if (!b) return;
  closeModal('detailModal');
  pendingRating = b.rating || 0;
  document.getElementById('editingId').value = b.id;
  document.getElementById('modalTitle').textContent = 'Editar libro';
  document.getElementById('modalSubtitle').textContent = b.title;
  document.getElementById('fTitle').value = b.title;
  document.getElementById('fAuthor').value = b.author;
  populateGenreSelect(b.genre || '');
  document.getElementById('fYear').value = b.year || '';
  document.getElementById('fStatus').value = b.status || 'pendiente';
  document.getElementById('fNotes').value = b.notes || '';
  updateStarsUI(pendingRating, 'starsInput');
  openModal('addModal');
}
